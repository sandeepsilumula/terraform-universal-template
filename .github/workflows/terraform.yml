name: "Terraform Infrastructure Deployment"

on:
  push:
    branches:
      - main

jobs:
  terraform:
    name: "Terraform Deploy to Dev"
    runs-on: ubuntu-latest

    # CRITICAL: This env block must be right here at the job level
    # so that the 'terraform init' step can see it and access S3.
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: "us-east-1"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file="environments/dev/terraform.tfvars" -no-color

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -var-file="environments/dev/terraform.tfvars" -auto-approve